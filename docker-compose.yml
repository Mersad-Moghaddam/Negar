services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-libro}
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/dev.env
    environment:
      MYSQL_HOST: mysql
      REDIS_ADDR: redis:6379
    depends_on:
      - mysql
      - redis
    ports:
      - '8080:8080'

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api/v1}
    depends_on:
      - backend
    ports:
      - '5173:5173'

volumes:
  mysql_data:
